  #     ENVIRONMENT_MODE: ${MAFSHOU_ENVIRONMENT_MODE}
  #     TIMEZONE: ${MAFSHOU_TIMEZONE}
  #     TZ: ${MAFSHOU_TIMEZONE}
  #     FRONTEND_PORT: "${MAFSHOU_PORT_PREFIX}300"
  #     PORT: "${MAFSHOU_PORT_PREFIX}300"
  #     SSR_API_URL: "https://backend:${MAFSHOU_PORT_PREFIX}443"
